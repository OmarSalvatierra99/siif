<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIIF · Acceso</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='img/ofs_logo.png') }}">
</head>
<body class="login-page">
    <main class="login-shell" aria-labelledby="login-title">
        <section class="login-auth-panel" aria-label="Formulario de acceso">
            <div class="login-logo-wrap" aria-hidden="true">
                <img src="{{ url_for('static', filename='img/ofs_logo.png') }}" alt="Logo institucional" class="ofs-logo">
            </div>

            <div class="panel-header login-header">
                <p class="eyebrow">Órgano de Fiscalización Superior del Estado de Tlaxcala</p>
                <h1 id="login-title">SIIF</h1>
                <p>Acceso institucional al sistema de procesamiento de auxiliares contables.</p>
            </div>

            {% if error %}
            <div class="status status-error">{{ error }}</div>
            {% endif %}

            <aside class="login-access-card" aria-label="Usuario autorizado">
                <h3>Usuario autorizado</h3>
                <div class="login-access-list">
                    <div class="login-access-user is-selected">
                        <span class="login-access-initials" aria-hidden="true">LU</span>
                        <span class="login-access-meta">
                            <strong>Luis</strong>
                        </span>
                    </div>
                </div>
            </aside>

            <form class="record-form login-form" method="POST" autocomplete="off">
                <input name="username" type="hidden" value="luis">
                <input type="hidden" name="next" value="{{ next_url }}">

                <div class="login-password-panel is-visible">
                    <h3 class="login-password-title">Contraseña de Luis</h3>
                    <div class="field">
                        <label for="password">Contraseña</label>
                        <input id="password" name="password" type="password" required autofocus>
                    </div>
                    <button class="btn-primary" type="submit">Entrar</button>
                </div>
            </form>
        </section>
    </main>

    <footer class="site-footer login-footer">
        © Órgano de Fiscalización Superior del Estado de Tlaxcala · SIIF
    </footer>
</body>
</html>
